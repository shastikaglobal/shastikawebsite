<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shastika Global</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

</head>

<body>

{% block content %}{% endblock %}


<!-- ================= SHASTIKA COCOBOT ================= -->

<!-- CHAT ICON -->
<div id="cocobot-icon">
💬
</div>

<!-- CHAT WINDOW -->
<div id="cocobot-box">
  <button id="cocobot-close" aria-label="Close chatbot">✕</button>
  <iframe
    src="https://chatbot-e99e.onrender.com"
    style="width:100%; height:100%; border:none;">
  </iframe>
</div>


<style>

/* CHAT ICON */

#cocobot-icon{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:black;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
z-index:9999;
}

/* CHAT WINDOW */

#cocobot-box{
position:fixed;
bottom:90px;
right:20px;
width:340px;
height:460px;
background:rgba(168,207,230,0.45);
backdrop-filter:blur(20px);
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
display:none;
overflow:hidden;
z-index:9999;
}

/* CLOSE BUTTON (top-right inside chat box) */
#cocobot-close{
position:absolute;
top:10px;
right:14px;
width:28px;
height:28px;
border:none;
border-radius:50%;
background:rgba(0,0,0,0.7);
color:#fff;
font-size:16px;
line-height:1;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
z-index:10000;
}
#cocobot-close:hover{
background:rgba(0,0,0,0.9);
}

</style>


<script>

document.addEventListener("DOMContentLoaded",function(){

const icon=document.getElementById("cocobot-icon");
const box=document.getElementById("cocobot-box");
const closeBtn=document.getElementById("cocobot-close");

if(!icon || !box) return;

icon.onclick=function(){

if(box.style.display==="block"){
box.style.display="none";
}else{
box.style.display="block";
}

};

if(closeBtn){
  closeBtn.onclick=function(){
    box.style.display="none";
  };
}

});

</script>


</body>
</html>
