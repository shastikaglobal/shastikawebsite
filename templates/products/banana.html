{% extends "base.html" %}

{% block content %}

<style>
*{
  font-family:'Cinzel', serif;
}

body{
  background:url("{{ url_for('static', filename='images/background.webp') }}") no-repeat center center fixed;
  background-size:cover;
  background-color:#001f3f;
}

/* GLASS STAGE */
.glass-shell-stage{
width:100%!important;
max-width:450px!important;
height:615px!important;
margin-left:-10px!important;
background:rgba(168,207,230,0.45);
border-radius:60% 40% 50% 50% / 40% 40% 60% 60%;
display:flex;
align-items:flex-end;
justify-content:center;
position:relative;
overflow:visible!important;
backdrop-filter:blur(40px);
-webkit-backdrop-filter:blur(40px);
border:1.5px solid rgba(255,255,255,0.3);
}

.product-seated{
padding-bottom:0!important;
margin-bottom:-100px!important;
transform:translateX(0);
width:90%!important;
transition:all .6s ease;
}

.glass-shell-stage:hover .product-seated{
transform:translateY(-20px) scale(1.05);
}
</style>


<main class="max-w-7xl mx-auto px-6 py-12">

<!-- PRODUCT CONTENT (unchanged) -->
<!-- your full banana page HTML here -->

</main>


<script>
const countries = {
"India":"+91",
"USA":"+1",
"UK":"+44",
"UAE":"+971"
};

const countrySelect=document.getElementById("countrySelect");
const countryCodeInput=document.getElementById("countryCode");

if(countrySelect){
Object.keys(countries).forEach(country=>{
const option=document.createElement("option");
option.value=country;
option.textContent=country;
countrySelect.appendChild(option);
});

countrySelect.addEventListener("change",function(){
countryCodeInput.value=countries[this.value]||"";
});
}
</script>

{% endblock %}
