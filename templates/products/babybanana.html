{% extends "base.html" %}
{% block content %}

<style>
*{
    font-family:'Cinzel', serif;
}

body{
    background:url("{{ url_for('static', filename='images/background.webp') }}") no-repeat center center fixed;
    background-size:cover;
    background-color:#001f3f;
}

/* 1. GLASS STAGE - PRESERVED MIRROR DESIGN */
.glass-shell-stage{
    width:100%!important;
    max-width:450px!important;
    height:615px!important;
    margin-left:-10px!important;
    background:rgba(168,207,230,0.45);
    border-radius:60% 40% 50% 50% / 40% 40% 60% 60%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:visible!important;
    backdrop-filter:blur(40px);
    -webkit-backdrop-filter:blur(40px);
    border:1.5px solid rgba(255,255,255,0.3);
}

/* 2. PRODUCT IMAGE POSITION */
.product-seated{
    padding-bottom:0!important;
    margin-bottom:-100px!important;
    transform:translateX(0);
    width:90%!important;
    transition:all .6s ease;
}

.glass-shell-stage:hover .product-seated{
    transform:translateY(-20px) scale(1.05);
}

/* 3. GLASS FORM */
.glass-form-card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);
    border-radius:24px;
    box-shadow:0 25px 50px rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.15);
}

.custom-input{
    background-color:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    padding:12px 16px;
    color:#fff;
    width:100%;
    outline:none;
    font-size:.9rem;
    transition:.3s;
}

.custom-input:focus{
    border-color:#4CAF50;
    background-color:rgba(255,255,255,0.1);
}

/* highlight cards */
.highlight-card{
    background:linear-gradient(135deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,0) 100%);
    border-bottom:1px solid rgba(74,222,128,.2);
    padding:1.5rem;
    transition:.3s;
}

.highlight-card:hover{
    background:rgba(255,255,255,.08);
    transform:translateY(-5px);
}
</style>

<main class="max-w-7xl mx-auto px-6 py-12">

<!-- FULL PRODUCT PAGE CONTENT HERE (unchanged) -->

</main>

<script>
const countries={
"India":"+91",
"USA":"+1",
"UK":"+44",
"UAE":"+971"
};

/* dropdown populate */
const countrySelect=document.getElementById("countrySelect");
const countryCodeInput=document.getElementById("countryCode");

if(countrySelect){
Object.keys(countries).forEach(country=>{
const option=document.createElement("option");
option.value=country;
option.textContent=country;
countrySelect.appendChild(option);
});
}

/* auto code */
if(countrySelect){
countrySelect.addEventListener("change",function(){
countryCodeInput.value=countries[this.value]||"";
});
}

/* enquiry submit */
function submitEnquiryForm(e){
e.preventDefault();
const form=e.target;

fetch("/submit_enquiry",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
product:form.querySelector('input[name="product"]').value,
name:form.querySelector('input[name="full_name"]').value,
country:form.querySelector('select[name="country"]').value,
phone:form.querySelector('input[name="country_code"]').value+" "+form.querySelector('input[name="phone"]').value,
email:form.querySelector('input[name="email"]').value
})
})
.then(res=>res.json())
.then(data=>{
if(data.status==="success"){
alert("Your enquiry has been sent successfully!");
form.reset();
document.getElementById("countryCode").value="";
}else{
alert("Something went wrong!");
}
})
.catch(()=>alert("Server error!"));
}
</script>



{% endblock %}
