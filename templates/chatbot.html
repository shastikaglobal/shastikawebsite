<div id="ai-chatbot" style="
position:fixed;
bottom:90px;
right:20px;
width:320px;
height:420px;
background:#fff;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
display:none;
flex-direction:column;
z-index:9999;
">
  <div style="background:#0b3d91;color:white;padding:10px;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:space-between;">
    <span>Shastika CocoBot</span>
    <button onclick="document.getElementById('ai-chatbot').style.display='none'" style="background:none;border:none;color:white;font-size:18px;cursor:pointer;line-height:1;padding:0;">✕</button>
  </div>
  <div id="ai-messages" style="flex:1;padding:10px;overflow-y:auto;"></div>
  <div style="display:flex;border-top:1px solid #ddd;">
    <input id="ai-input" type="text" placeholder="Ask about our products..." style="flex:1;border:none;padding:10px;">
    <button id="ai-send" style="background:#0b3d91;color:white;border:none;padding:10px;">Send</button>
  </div>
</div>
